<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wenbo Bi - Tableau Portfolio</title>

  <!-- Tableau Embedding API v3 -->
  <script
    type="module"
    src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f7f8fa;
      color: #222;
    }

    header {
      padding: 40px 8%;
      background: #111827;
      color: white;
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    header p {
      margin: 0;
      font-size: 16px;
      color: #d1d5db;
    }

    main {
      padding: 32px 8%;
    }

    .project-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .project-card h2 {
      margin-top: 0;
      font-size: 24px;
    }

    .project-card p {
      color: #555;
      line-height: 1.6;
    }

    .tableau-wrapper {
      width: 100%;
      height: 850px;
      margin-top: 24px;
    }

    tableau-viz {
      width: 100%;
      height: 100%;
    }

    footer {
      padding: 24px 8%;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Wenbo Bi - Data Analytics Portfolio</h1>
    <p>A-share style rotation, relative momentum, and Tableau dashboard examples.</p>
  </header>

  <main>
    <section class="project-card">
      <h2>成长 / 价值风格轮动分析</h2>
      <p>
        该 Tableau Public 作品展示了不同成长/价值指数对的滚动相对收益、
        多周期风格表现和可视化分析结果。
      </p>

      <div class="tableau-wrapper">
        <tableau-viz
          id="tableauViz"
          src="https://public.tableau.com/views/vs_17812455678280/Return_Rolling"
          toolbar="bottom"
          hide-tabs>
        </tableau-viz>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Wenbo Bi. Built with Tableau Public.
  </footer>
</body>
</html>
